# Boot splash sequence (see BootIniConfig / BootSplashCanvas)
#
# Each [splash.N] may use:
#   - Simple mode: text, textX, textY, textSize, textColor, textAlign, image, imageX, imageY (one text and one image)
#   - Indexed mode: text.0, text.1, ... (with textX.0, textY.0, textSize.0, textColor.0, textAlign.0, etc. per index)
#                    image.0, image.1, ... (with imageX.0, imageY.0, etc.)
#   If any key text.M or textX.M, etc. (M n>=0) is present, the slide uses indexed mode; legacy text/textX
#   is fallback for index 0 (text, text.0) when text.0 is missing.
#   Same for image.M vs legacy image.
#
# textAlign / textAlign.N = left | center | right (anchored at the given textX, textY point).
# Screen macros in text, textX, textY, imageX, imageY (expanded at draw time; W/H = canvas size in px):
#   %W% = width, %H% = height, %W2% = width/2, %H2% = height/2
#   After expanding, you may add/subtract: textX.0=%W2%+20  textY.0=%H%-8  (chain: %W%-10+4)

[tick]
ms=50

[boot]
# immediate = hand off to the game as soon as cold start finishes (may cut splash)
# after_slide = wait until the current slide finishes (holdMs) before handoff when cold start is ready
# es6 = true (default) runs the ES6 preprocessor (slower; modern syntax). false skips it (faster; legacy JS only)
slides=1
handoff=after_slide

[splash.0]
background=#202020
text.0=Built with Athena2ME
textX.0=%W2%
textY.0=%H2%
textSize.0=MEDIUM
textColor.0=#ffffff
textAlign.0=center

text.1=A modern JavaScript runtime for J2ME
textX.1=%W2%
textY.1=%H2%+20
textSize.1=SMALL
textColor.1=#8000FF
textAlign.1=center

text.2=Loading...
textX.2=8
textY.2=8
textSize.2=SMALL
textColor.2=#cccccc
textAlign.2=left

image.0=
imageX.0=0
imageY.0=40

holdMs=1000
