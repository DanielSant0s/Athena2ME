# Athena2ME — CI
#
# Jobs:
#   api-manifest  → generates build/j2me-api.json (always)
#   build-jar     → compiles Java, packages & preverifies the MIDlet JAR (always)
#   release-attach → on v* tags: attaches both artefacts to the GitHub Release

name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 1. API manifest (Node.js, no Java needed) ──────────────────────────
  api-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate j2me-api.json
        run: node scripts/export-j2me-api.mjs

      - name: Verify manifest
        run: |
          test -s build/j2me-api.json
          node -e "
            const j = require('./build/j2me-api.json');
            if (!Array.isArray(j.natives) || j.natives.length < 1) process.exit(1);
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: j2me-api
          path: build/j2me-api.json

  # ── 2. J2ME build ──────────────────────────────────────────────────────
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use JDK 8 — maximum compatibility with javac -source 1.3 -target 1.1
      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"

      # ProGuard is used for preverification (-microedition flag).
      # We download it once and cache it across runs.
      - name: Cache ProGuard
        id: cache-proguard
        uses: actions/cache@v4
        with:
          path: tools/proguard.jar
          key: proguard-7.4.2

      - name: Download ProGuard
        if: steps.cache-proguard.outputs.cache-hit != 'true'
        run: |
          mkdir -p tools
          curl -fsSL \
            "https://github.com/Guardsquare/proguard/releases/download/v7.4.2/proguard-7.4.2.zip" \
            -o tools/proguard.zip
          unzip -j tools/proguard.zip "proguard-7.4.2/lib/proguard.jar" -d tools/
          rm tools/proguard.zip

      - name: Build (compile + jar + preverify + jad)
        run: ant all

      - name: Verify JAR
        run: |
          test -s build/Athena2ME.jar
          test -s build/Athena2ME.jad
          # Must contain the MIDlet class at the root
          unzip -l build/Athena2ME.jar | grep -q "Athena2ME.class"
          echo "JAR size: $(du -h build/Athena2ME.jar | cut -f1)"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: Athena2ME-jar
          path: |
            build/Athena2ME.jar
            build/Athena2ME.jad

  # ── 3. Attach to GitHub Release on v* tags ─────────────────────────────
  release-attach:
    needs: [api-manifest, build-jar]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download API manifest
        uses: actions/download-artifact@v4
        with:
          name: j2me-api
          path: release-assets

      - name: Download JAR + JAD
        uses: actions/download-artifact@v4
        with:
          name: Athena2ME-jar
          path: release-assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/j2me-api.json
            release-assets/Athena2ME.jar
            release-assets/Athena2ME.jad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
