# Athena2ME — build API manifest for AthenaStudio and other consumers.
# When you tag v*, the workflow attaches build/j2me-api.json to the GitHub Release.

name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  api-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate j2me-api.json
        run: node scripts/export-j2me-api.mjs

      - name: Verify manifest
        run: test -s build/j2me-api.json && node -e "const j=require('./build/j2me-api.json'); if(!Array.isArray(j.natives)||j.natives.length<1)process.exit(1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: j2me-api
          path: build/j2me-api.json

  release-attach:
    needs: api-manifest
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: j2me-api
          path: release-assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/j2me-api.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
